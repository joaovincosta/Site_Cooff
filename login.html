<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COOFF – Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

  <!-- LEFT PANEL -->
  <div class="photo-panel">
    <div class="photo-logo">
      <!-- Coffee bean SVG mark -->
      <svg class="logo-mark" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="20" stroke="#C9A14A" stroke-width="1.5"/>
        <ellipse cx="22" cy="22" rx="9" ry="14" stroke="#C9A14A" stroke-width="1.2"/>
        <path d="M22 8 Q26 22 22 36" stroke="#C9A14A" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <span class="logo-wordmark">C<span>O</span>OFF</span>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="form-panel">
    <a href="index.html" class="back-arrow" aria-label="Voltar">→</a>

    <h1>Login</h1>
    <p class="subtitle">Preencha os dados abaixo.</p>

    <!-- Google -->
    <button class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      login com Google
    </button>

    <div class="divider-row"><span>ou use seu email</span></div>

    <div class="field">
      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="Ex:  modesto.m.nicole@gmail.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <input id="senha" type="password" value="•••••••••" autocomplete="current-password"/>
    </div>

    <div class="forgot-row">
      <a href="#">Esqueceu a senha?</a>
    </div>

    <button class="btn-submit">Entrar</button>

    <p class="register-row">
      Não tem uma conta? <a href="#">Criar conta</a>
    </p>
  </div>

</body>
</html>
